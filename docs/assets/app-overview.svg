  </g>
  <g transform="translate(746 265)">
    <rect width="622" height="210" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Upfront Cost Split</text>
    <circle cx="316" cy="122" r="62" fill="none" stroke="#2563eb" stroke-width="32"/>
    <path d="M316 60 A62 62 0 0 1 374 101" fill="none" stroke="#f59e0b" stroke-width="32"/>
    <path d="M374 101 A62 62 0 0 1 335 181" fill="none" stroke="#10b981" stroke-width="32"/>
  </g>
  <g transform="translate(72 505)">

<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Mortgage Simulator overview</title>
  <desc id="desc">A simplified overview of the Streamlit app sections: summary, purchase and mortgage, room pricing, surplus allocation, and detailed summary.</desc>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <text x="72" y="82" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">Mortgage Simulator</text>
  <g transform="translate(72 125)">
    <rect width="1296" height="110" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Summary</text>
    <g font-family="Arial, sans-serif" font-size="18" fill="#374151">
      <text x="28" y="82">Upfront cash</text>
      <text x="280" y="82">Mortgage amount</text>
      <text x="555" y="82">Monthly payment</text>
      <text x="835" y="82">Net rent</text>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: light dark;
        --primary-color: rgb(255, 75, 75);
        --background-color: rgb(255, 255, 255);
        --secondary-background-color: rgb(240, 242, 246);
        --text-color: rgb(49, 51, 63);
        --border-color: rgba(49, 51, 63, 0.2);
        font-family: "Source Sans Pro", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      button {
        background: var(--secondary-background-color);
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        color: var(--text-color);
        cursor: pointer;
        font: inherit;
        font-size: 1.1rem;
        height: 2.5rem;
        line-height: 1;
        margin: 0;
        padding: 0;
        width: 100%;
      }

      button:focus {
        border-color: var(--primary-color);
        box-shadow: inset 0 0 0 1px var(--primary-color);
        outline: none;
      }

      button:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
      }

      button:active {
        color: var(--primary-color);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background-color: rgb(14, 17, 23);
          --secondary-background-color: rgb(38, 39, 48);
          --text-color: rgb(250, 250, 250);
          --border-color: rgba(250, 250, 250, 0.2);
        }
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <button
        type="button"
        data-direction="invest"
        title="Move surplus from repayment to investment. Shift: 15%, Ctrl/Cmd: 30%."
      >
        →
      </button>
      <button
        type="button"
        data-direction="repay"
        title="Move surplus from investment to repayment. Shift: 15%, Ctrl/Cmd: 30%."
      >
        ←
      </button>
    </div>

    <script>
      const streamlitMessage = (type, data = {}) => {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...data,
          },
          "*",
        );
      };

      const setHeight = () => {
        streamlitMessage("streamlit:setFrameHeight", {
          height: document.documentElement.scrollHeight,
        });
      };

      const setTheme = (theme = {}) => {
        const root = document.documentElement;
        if (theme.primaryColor) root.style.setProperty("--primary-color", theme.primaryColor);
        if (theme.backgroundColor) root.style.setProperty("--background-color", theme.backgroundColor);
        if (theme.secondaryBackgroundColor) {
          root.style.setProperty("--secondary-background-color", theme.secondaryBackgroundColor);
        }
        if (theme.borderColor) root.style.setProperty("--border-color", theme.borderColor);
        if (theme.textColor) root.style.setProperty("--text-color", theme.textColor);
        if (theme.font) root.style.fontFamily = theme.font;
      };

      const getStep = (event) => {
        if (event.ctrlKey || event.metaKey) {
          return 30;
        }
        if (event.shiftKey) {
          return 15;
        }
        return 5;
      };

      document.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", (event) => {
          streamlitMessage("streamlit:setComponentValue", {
            dataType: "json",
            value: {
              direction: button.dataset.direction,
              step: getStep(event),
              id: `${Date.now()}-${Math.random()}`,
            },
          });
        });
      });

      window.addEventListener("message", (event) => {
        if (event.data.type === "streamlit:render") {
          setTheme(event.data.theme);
          setHeight();
        }
      });

      streamlitMessage("streamlit:componentReady", { apiVersion: 1 });
      setHeight();
    </script>
  </body>
</html>
